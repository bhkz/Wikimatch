services:
  - type: worker
    name: wikimatch-worker
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run worker:start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: WIKIMEDIA_USER_AGENT
        sync: false
      - key: WORKER_DRY_RUN
        value: "true"
      - key: WORKER_FETCH_DIFF
        value: "true"
      - key: LOG_LEVEL
        value: "info"
