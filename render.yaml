services:
  # Service unique Render qui héberge le worker SSE + l'analyzer +
  # le pattern matcher dans le même process Node via runtime/src/index.ts.
  # Chaque job tourne en sous-processus tsx pour isoler les SIGINT
  # et les fuites mémoire éventuelles, mais Render ne voit qu'un seul
  # service à scaler / monitorer.
  #
  # Pour désactiver un job (ex: pendant un dry-run ciblé) :
  #   RUNTIME_RUN_WORKER=false
  #   RUNTIME_RUN_ANALYZER=false
  #   RUNTIME_RUN_PATTERNS=false
  - type: worker
    name: revision90
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Supabase (worker + analyzer + patterns)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # Worker SSE Wikimedia
      - key: WIKIMEDIA_USER_AGENT
        sync: false
      - key: WORKER_DRY_RUN
        value: "true"
      - key: WORKER_FETCH_DIFF
        value: "true"

      # Analyzer (extraction IA des propositions)
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_DAILY_EUR_CAP
        value: "6.50"
      - key: ANALYZER_DRY_RUN
        value: "true"
      - key: ANALYZER_POLL_INTERVAL_MS
        value: "10000"
      - key: ANALYZER_BATCH_SIZE
        value: "5"

      # Patterns matcher + template publisher
      - key: PATTERNS_DRY_RUN
        value: "true"
      - key: PATTERNS_POLL_INTERVAL_MS
        value: "30000"
      - key: AUTO_PUBLICATION_ENABLED
        value: "false" # Safety gate: must be set explicitly to "true" after manual review of detected patterns during rehearsal.

      # Commun
      - key: LOG_LEVEL
        value: "info"
